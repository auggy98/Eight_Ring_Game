<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Rings Puzzle - Pro Version</title>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --ring-1: #ef4444; /* Default Red */
            --ring-2: #f59e0b; /* Default Yellow */
            --slot-bg: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #1e293b;
        }

        .game-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        /* Settings Panel */
        .settings-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .setting-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            background: none;
        }

        .board {
            display: flex;
            gap: 8px;
            background: var(--slot-bg);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 25px;
            justify-content: center;
            overflow-x: auto;
        }

        .slot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            background: rgba(255,255,255,0.5);
            flex-shrink: 0;
        }

        .slot.empty { border: 2px dashed #cbd5e0; }
        .slot.empty:hover { background: white; border-color: var(--primary); }

        .ring {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }

        .type-r { background-color: var(--ring-1); border: 2px solid rgba(0,0,0,0.1); }
        .type-y { background-color: var(--ring-2); border: 2px solid rgba(0,0,0,0.1); }

        .selected {
            background: var(--primary) !important;
            transform: translateY(-10px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5);
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.95); }
        .btn-undo { background: #64748b; color: white; }
        .btn-reset { background: #ef4444; color: white; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #message {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 1.5em;
        }

        .win-text { color: #10b981; }
        .fail-text { color: #f43f5e; }

        /* Simple Switch styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

    </style>
</head>
<body>

    <div class="game-container">
        <h1>8 Rings Puzzle</h1>
        
        <!-- Customization Menu -->
        <div class="settings-panel">
            <div class="setting-group">
                <label>Ring 1:</label>
                <input type="color" id="color1" value="#ef4444" onchange="updateColors()">
            </div>
            <div class="setting-group">
                <label>Ring 2:</label>
                <input type="color" id="color2" value="#f59e0b" onchange="updateColors()">
            </div>
            <div class="setting-group">
                <label>Confetti:</label>
                <label class="switch">
                    <input type="checkbox" id="confettiToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 500;">
            <span>Moves: <span id="move-count">0</span>/4</span>
            <span id="hint">Select a pair of rings</span>
        </div>

        <div id="board" class="board"></div>

        <div class="controls">
            <button class="btn-undo" id="undoBtn" onclick="undo()" disabled>Undo</button>
            <button class="btn-reset" onclick="reset()">Restart</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        const INITIAL = ['E', 'E', 'R', 'Y', 'R', 'Y', 'R', 'Y', 'R', 'Y', 'E', 'E'];
        let board = [...INITIAL];
        let history = [];
        let moves = 0;
        let selected = [];

        function updateColors() {
            const c1 = document.getElementById('color1').value;
            const c2 = document.getElementById('color2').value;
            document.documentElement.style.setProperty('--ring-1', c1);
            document.documentElement.style.setProperty('--ring-2', c2);
        }

        function render() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            board.forEach((val, i) => {
                const slot = document.createElement('div');
                slot.className = `slot ${val === 'E' ? 'empty' : ''} ${selected.includes(i) ? 'selected' : ''}`;
                
                if (val !== 'E') {
                    const ring = document.createElement('div');
                    ring.className = `ring type-${val.toLowerCase()}`;
                    slot.appendChild(ring);
                }

                slot.onclick = () => handleClick(i);
                boardEl.appendChild(slot);
            });

            document.getElementById('move-count').innerText = moves;
            document.getElementById('undoBtn').disabled = history.length === 0;
            document.getElementById('hint').innerText = selected.length ? "Now select empty slots" : "Select a pair of rings";
        }

        function handleClick(i) {
            if (moves >= 4 && !checkWin()) return;

            if (selected.length === 0) {
                if (board[i] !== 'E') {
                    // Selection Logic: try to pick a pair
                    if (board[i+1] !== 'E' && i < board.length - 1) selected = [i, i+1];
                    else if (board[i-1] !== 'E' && i > 0) selected = [i-1, i];
                }
            } else {
                // Deselect or switch if clicking a ring
                if (board[i] !== 'E') {
                    selected = [];
                    handleClick(i);
                    return;
                }

                // Check for two adjacent empty slots
                let target = [];
                if (board[i] === 'E' && board[i+1] === 'E') target = [i, i+1];
                else if (board[i] === 'E' && board[i-1] === 'E') target = [i-1, i];

                if (target.length === 2) {
                    history.push([...board]);
                    board[target[0]] = board[selected[0]];
                    board[target[1]] = board[selected[1]];
                    board[selected[0]] = 'E';
                    board[selected[1]] = 'E';
                    moves++;
                    selected = [];
                    finishMove();
                } else {
                    selected = [];
                }
            }
            render();
        }

        function finishMove() {
            const isWin = checkWin();
            const msg = document.getElementById('message');
            
            if (isWin) {
                msg.innerText = "🌟 Masterfully Solved!";
                msg.className = "win-text";
                if (document.getElementById('confettiToggle').checked) {
                    fireConfetti();
                }
            } else if (moves >= 4) {
                msg.innerText = "Out of moves! Try again.";
                msg.className = "fail-text";
            }
        }

        function checkWin() {
            const rings = board.map((v, i) => v !== 'E' ? i : null).filter(v => v !== null);
            if (rings.length < 8) return false;
            
            // Gap check
            if (rings[7] - rings[0] !== 7) return false;

            const pattern = rings.map(i => board[i]).join('');
            return pattern === "RRRRYYYY" || pattern === "YYYYRRRR";
        }

        function fireConfetti() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: [document.getElementById('color1').value, document.getElementById('color2').value]
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: [document.getElementById('color1').value, document.getElementById('color2').value]
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function undo() {
            if (history.length > 0) {
                board = history.pop();
                moves--;
                selected = [];
                document.getElementById('message').innerText = "";
                render();
            }
        }

        function reset() {
            board = [...INITIAL];
            history = [];
            moves = 0;
            selected = [];
            document.getElementById('message').innerText = "";
            render();
        }

        render();
    </script>
</body>
</html>
