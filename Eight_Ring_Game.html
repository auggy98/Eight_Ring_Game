<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Rings Puzzle - With Undo</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #3498db;
            --secondary: #95a5a6;
            --success: #27ae60;
            --danger: #e74c3c;
            --red-ring: #ff5e57;
            --red-border: #c0392b;
            --yellow-ring: #f1c40f;
            --yellow-border: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90vw;
        }

        h1 { color: #2c3e50; margin-bottom: 0.5rem; }
        
        .instructions {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .board {
            display: flex;
            gap: 10px;
            background: #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .slot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            background: rgba(255,255,255,0.4);
        }

        .slot.empty {
            border: 2px dashed #cbd5e0;
        }

        .slot.empty:hover {
            background: white;
            border-color: var(--primary);
        }

        .ring {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .red { background-color: var(--red-ring); border: 2px solid var(--red-border); }
        .yellow { background-color: var(--yellow-ring); border: 2px solid var(--yellow-border); }

        .selected {
            background: var(--primary) !important;
            border-color: #2980b9 !important;
            transform: translateY(-8px);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-top: 1rem;
        }

        .status-area {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: bold;
            color: #34495e;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-reset { background: var(--danger); color: white; }
        .btn-undo { background: var(--secondary); color: white; }

        #message {
            margin-top: 1.5rem;
            height: 24px;
            font-weight: bold;
        }
        .win { color: var(--success); }
        .lose { color: var(--danger); }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>8 Rings Puzzle</h1>
        <div class="instructions">
            Group colors in 4 moves. Select a pair of rings, then a pair of empty slots.
        </div>

        <div class="status-area">
            <span>Moves: <span id="move-count">0</span> / 4</span>
            <span id="hint-msg">Select a pair...</span>
        </div>

        <div id="board" class="board"></div>

        <div class="controls">
            <button class="btn-undo" id="undoBtn" onclick="undoMove()" disabled>Undo Move</button>
            <button class="btn-reset" onclick="resetGame()">Restart</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        // E = Empty, R = Red, Y = Yellow
        // 12 slots: 2 Empty, 8 Rings (alternating), 2 Empty
        const INITIAL_STATE = ['E', 'E', 'R', 'Y', 'R', 'Y', 'R', 'Y', 'R', 'Y', 'E', 'E'];
        let board = [...INITIAL_STATE];
        let history = []; // Stack for undo functionality
        let moves = 0;
        let selectedIndices = [];

        const boardEl = document.getElementById('board');
        const moveEl = document.getElementById('move-count');
        const msgEl = document.getElementById('message');
        const undoBtn = document.getElementById('undoBtn');
        const hintEl = document.getElementById('hint-msg');

        function render() {
            boardEl.innerHTML = '';
            board.forEach((val, i) => {
                const slot = document.createElement('div');
                slot.className = `slot ${val === 'E' ? 'empty' : ''}`;
                if (selectedIndices.includes(i)) slot.classList.add('selected');

                if (val !== 'E') {
                    const ring = document.createElement('div');
                    ring.className = `ring ${val === 'R' ? 'red' : 'yellow'}`;
                    slot.appendChild(ring);
                }

                slot.onclick = () => handleInput(i);
                boardEl.appendChild(slot);
            });

            moveEl.innerText = moves;
            undoBtn.disabled = history.length === 0;
            
            if (selectedIndices.length > 0) {
                hintEl.innerText = "Select empty slots...";
            } else {
                hintEl.innerText = moves < 4 ? "Select a pair..." : "Game Over";
            }
        }

        function handleInput(i) {
            if (moves >= 4 && !checkWin()) return;

            // Selection Phase
            if (selectedIndices.length === 0) {
                if (board[i] !== 'E') {
                    // Automatically grab the neighbor to form a pair
                    if (board[i+1] !== 'E' && i < board.length - 1) {
                        selectedIndices = [i, i+1];
                    } else if (board[i-1] !== 'E' && i > 0) {
                        selectedIndices = [i-1, i];
                    }
                }
            } 
            // Movement Phase
            else {
                // If user clicks a ring again, switch selection
                if (board[i] !== 'E') {
                    selectedIndices = [];
                    handleInput(i);
                    return;
                }

                // Check for two adjacent empty slots
                let destination = [];
                if (board[i] === 'E' && board[i+1] === 'E') {
                    destination = [i, i+1];
                } else if (board[i] === 'E' && board[i-1] === 'E') {
                    destination = [i-1, i];
                }

                if (destination.length === 2) {
                    executeMove(selectedIndices, destination);
                } else {
                    selectedIndices = []; // Invalid click, deselect
                }
            }
            render();
        }

        function executeMove(from, to) {
            // Save state to history before changing anything
            history.push([...board]);

            // Move the rings
            board[to[0]] = board[from[0]];
            board[to[1]] = board[from[1]];
            board[from[0]] = 'E';
            board[from[1]] = 'E';

            moves++;
            selectedIndices = [];
            
            if (checkWin()) {
                msgEl.innerText = "🎉 Brilliant! You solved it!";
                msgEl.className = "win";
            } else if (moves >= 4) {
                msgEl.innerText = "No moves left. Try again!";
                msgEl.className = "lose";
            }
        }

        function undoMove() {
            if (history.length > 0) {
                board = history.pop();
                moves--;
                selectedIndices = [];
                msgEl.innerText = "";
                render();
            }
        }

        function checkWin() {
            const rings = board.map((v, i) => v !== 'E' ? i : null).filter(v => v !== null);
            if (rings.length === 0) return false;

            // Check for gaps
            const isContinuous = (rings[rings.length-1] - rings[0]) === 7;
            if (!isContinuous) return false;

            // Check color grouping
            const pattern = rings.map(i => board[i]).join('');
            return (pattern === "RRRRYYYY" || pattern === "YYYYRRRR");
        }

        function resetGame() {
            board = [...INITIAL_STATE];
            history = [];
            moves = 0;
            selectedIndices = [];
            msgEl.innerText = "";
            render();
        }

        render();
    </script>
</body>
</html>
